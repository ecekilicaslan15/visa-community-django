{% extends "base.html" %}

{% block content %}
  <h1 class="mb-4">Countries</h1>

  <div class="row">
    {% for c in countries %}
      <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-1">
              {{ c.name }}

              {% if c.comment_count > 0 %}
                <span class="badge bg-primary ms-2">
                  {{ c.comment_count }}
                </span>
              {% else %}
                <span class="badge bg-secondary ms-2">
                  0
                </span>
              {% endif %}
            </h5>


            {% if c.description %}
              <p class="card-text text-muted">
                {{ c.description|truncatewords:20 }}
              </p>
            {% endif %}

            <a href="{% url 'country_detail' c.slug %}" class="btn btn-primary btn-sm">
              View details
            </a>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
