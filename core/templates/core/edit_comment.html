{% extends "base.html" %}

{% block content %}
  <h3>Edit comment</h3>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-primary btn-sm">
      Save changes
    </button>

    <a
      href="{% url 'country_detail' comment.country.slug %}"
      class="btn btn-secondary btn-sm ms-2"
    >
      Cancel
    </a>
  </form>
{% endblock %}
